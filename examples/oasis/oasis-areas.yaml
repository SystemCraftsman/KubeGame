apiVersion: kubegame.systemcraftsman.com/v1alpha1
kind: Area
metadata:
  name: ludus-campus
spec:
  game: oasis
  world: incipio
  description: The main campus area on Ludus where new avatars spawn and attend school.
  connectedAreas:
    - ludus-courtyard
    - ludus-library
  properties:
    - name: pvpEnabled
      value: "false"
    - name: level
      value: "1"
    - name: type
      value: spawn
---
apiVersion: kubegame.systemcraftsman.com/v1alpha1
kind: Area
metadata:
  name: ludus-courtyard
spec:
  game: oasis
  world: incipio
  description: The open courtyard outside the school buildings. A common gathering place for students.
  connectedAreas:
    - ludus-campus
    - ludus-library
  properties:
    - name: pvpEnabled
      value: "false"
    - name: level
      value: "1"
    - name: type
      value: social
---
apiVersion: kubegame.systemcraftsman.com/v1alpha1
kind: Area
metadata:
  name: ludus-library
spec:
  game: oasis
  world: incipio
  description: The school library where avatars can research Halliday's clues and study game lore.
  connectedAreas:
    - ludus-campus
    - ludus-courtyard
  properties:
    - name: pvpEnabled
      value: "false"
    - name: level
      value: "1"
    - name: type
      value: research
