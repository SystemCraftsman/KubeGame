# permissions for end users to view avatars.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: clusterrole
    app.kubernetes.io/instance: avatar-viewer-role
    app.kubernetes.io/component: rbac
    app.kubernetes.io/created-by: kubegame
    app.kubernetes.io/part-of: kubegame
    app.kubernetes.io/managed-by: kustomize
  name: avatar-viewer-role
rules:
  - apiGroups:
      - kubegame.systemcraftsman.com
    resources:
      - avatars
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - kubegame.systemcraftsman.com
    resources:
      - avatars/status
    verbs:
      - get
